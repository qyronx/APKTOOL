<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APKWorkshop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e14;
            color: #c8d6e5;
            font-family: 'Fira Code', 'Consolas', monospace;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container { max-width: 800px; width: 100%; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2e3b4e;
            padding-bottom: 12px;
            margin-bottom: 30px;
        }
        .brand { font-size: 26px; font-weight: 700; color: #00e5ff; }
        .brand span { color: #ff6b6b; margin-right: 8px; }
        .upload-zone {
            border: 2px dashed #2e4a6a;
            border-radius: 14px;
            padding: 40px 10px;
            text-align: center;
            cursor: pointer;
            background: #0f1621;
            margin-bottom: 24px;
            transition: 0.2s;
        }
        .upload-zone:hover { border-color: #00e5ff; background: #182233; }
        .upload-zone i { font-size: 48px; color: #4a6a8a; margin-bottom: 12px; }
        .upload-zone p { color: #7f95b0; font-size: 15px; }
        .upload-zone .note { font-size: 12px; color: #4f6b8a; margin-top: 6px; }
        #fileInput { display: none; }
        .panel {
            background: #141a24;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a3748;
            margin-bottom: 20px;
        }
        .panel label { display: block; font-size: 13px; color: #9bb0cc; margin-bottom: 6px; }
        .panel input {
            width: 100%;
            background: #0b111c;
            border: 1px solid #2a3a50;
            padding: 10px 12px;
            border-radius: 10px;
            color: #e0edf5;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
        }
        .panel input:focus { border-color: #00e5ff; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
        }
        .btn-primary { background: #0077be; color: white; }
        .btn-primary:hover { background: #0095dd; }
        .btn-success { background: #1d7a5a; color: white; }
        .btn-success:hover { background: #2a9a72; }
        .btn-danger { background: #8a2a3a; color: white; }
        .btn-danger:hover { background: #b34050; }
        .btn:disabled { opacity: 0.4; pointer-events: none; }
        .status-console {
            background: #0a0f18;
            border-radius: 12px;
            padding: 12px 14px;
            border: 1px solid #1a2635;
            font-size: 13px;
            color: #7d9abc;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
        }
        .status-console .ok { color: #5fdb9a; }
        .status-console .err { color: #f77a8a; }
        .status-console .info { color: #62b5f0; }
        .info-box {
            background: #0f1622;
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #26323f;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-box .label { color: #6f8aa8; font-size: 13px; }
        .info-box .value { color: #00e5ff; font-size: 14px; font-weight: 600; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="brand"><span>⧩</span>APKWorkshop</div>
        <div style="font-size:13px; color:#4f6b8a;">패키지명 변경 전용</div>
    </div>

    <!-- 업로드 -->
    <div class="upload-zone" id="dropZone">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>APK / XAPK 드랍 또는 클릭하여 업로드</p>
        <div class="note">디컴파일 후 원본 패키지명을 추출합니다</div>
        <input type="file" id="fileInput" accept=".apk,.xapk">
    </div>

    <!-- 상태 -->
    <div class="panel">
        <div class="info-box">
            <span class="label">📦 작업 ID</span>
            <span class="value" id="jobIdLabel">없음</span>
        </div>
        <div class="info-box">
            <span class="label">📱 원본 패키지명</span>
            <span class="value" id="originalPackageLabel">-</span>
        </div>
    </div>

    <!-- 패키지명 변경 -->
    <div class="panel">
        <label><i class="fas fa-cube"></i> 새 패키지명</label>
        <input type="text" id="newPackageInput" placeholder="예: com.your.new.app">
        <div style="font-size:11px; color:#4e6b8a; margin-top:6px;">AndroidManifest + smali + res 전체 치환</div>
        <div class="flex">
            <button class="btn btn-primary" id="rebuildBtn"><i class="fas fa-sync-alt"></i> 리빌드 + 서명</button>
            <button class="btn btn-danger" id="resetBtn"><i class="fas fa-trash-alt"></i> 초기화</button>
        </div>
        <div style="margin-top:12px;">
            <a href="#" id="downloadLink" style="color:#00e5ff; text-decoration:none; opacity:0.5; pointer-events:none;">다운로드 준비 안됨</a>
            <button class="btn btn-success" id="forceDownloadBtn" disabled style="padding:8px 16px; font-size:13px;"><i class="fas fa-download"></i> 받기</button>
        </div>
    </div>

    <!-- 콘솔 -->
    <div class="status-console" id="consoleLog">
        <span class="info">▶ 시스템 온라인 · APK 업로드 대기 중</span>
    </div>
</div>

<script>
(function() {
    const STATE = {
        jobId: null,
        originalPackage: null,
        signedUrl: null,
    };

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const jobIdLabel = document.getElementById('jobIdLabel');
    const originalPackageLabel = document.getElementById('originalPackageLabel');
    const consoleLog = document.getElementById('consoleLog');
    const newPackageInput = document.getElementById('newPackageInput');
    const rebuildBtn = document.getElementById('rebuildBtn');
    const resetBtn = document.getElementById('resetBtn');
    const downloadLink = document.getElementById('downloadLink');
    const forceDownloadBtn = document.getElementById('forceDownloadBtn');

    const API_BASE = '/api';

    function log(msg, type = 'info') {
        const cls = { info: 'info', ok: 'ok', err: 'err' }[type] || 'info';
        consoleLog.innerHTML += `<div class="${cls}">> ${msg}</div>`;
        consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    function clearLog() { consoleLog.innerHTML = ''; }

    async function apiCall(endpoint, method = 'GET', body = null) {
        const opts = { 
            method, 
            headers: { 'Accept': 'application/json' } 
        };
        if (body && !(body instanceof FormData)) {
            opts.headers['Content-Type'] = 'application/json';
            opts.body = JSON.stringify(body);
        } else if (body instanceof FormData) {
            opts.body = body;
        }
        try {
            const res = await fetch(`${API_BASE}${endpoint}`, opts);
            if (!res.ok) {
                const errText = await res.text();
                throw new Error(`HTTP ${res.status}: ${errText}`);
            }
            return await res.json();
        } catch (e) {
            log(`API 호출 실패: ${e.message}`, 'err');
            throw e;
        }
    }

    async function uploadFile(file) {
        const form = new FormData();
        form.append('file', file);
        clearLog();
        log(`업로드 시작: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`);
        try {
            const data = await apiCall('/upload', 'POST', form);
            STATE.jobId = data.job_id;
            STATE.originalPackage = data.original_package;
            jobIdLabel.textContent = STATE.jobId;
            originalPackageLabel.textContent = STATE.originalPackage;
            log(`디컴파일 완료 · 원본 패키지명: ${STATE.originalPackage}`, 'ok');
            // ★★★ 자동 변경 제거 - 사용자가 직접 입력하도록 ★★★
            newPackageInput.placeholder = `예: com.${STATE.originalPackage.split('.').slice(-1)[0] || 'newapp'}.mod`;
        } catch (e) {
            log(`업로드 실패: ${e.message}`, 'err');
        }
    }

    async function rebuildAndSign() {
        if (!STATE.jobId) {
            log('먼저 APK를 업로드하세요.', 'err');
            return;
        }
        const newPkg = newPackageInput.value.trim();
        if (!newPkg) {
            log('새 패키지명을 입력하세요.', 'err');
            return;
        }
        if (newPkg === STATE.originalPackage) {
            log('기존 패키지명과 동일합니다. 다른 이름을 입력하세요.', 'err');
            return;
        }
        clearLog();
        log(`리빌드 시작: ${STATE.originalPackage} → ${newPkg}`, 'info');
        rebuildBtn.disabled = true;
        try {
            const data = await apiCall(`/rebuild/${STATE.jobId}`, 'POST', { new_package: newPkg });
            STATE.signedUrl = data.download_url;
            log(`리빌드 완료: ${data.message}`, 'ok');
            downloadLink.href = `${API_BASE}${STATE.signedUrl}`;
            downloadLink.style.opacity = '1';
            downloadLink.style.pointerEvents = 'auto';
            downloadLink.textContent = `📥 ${newPkg}.apk 다운로드`;
            forceDownloadBtn.disabled = false;
        } catch (e) {
            log(`리빌드 실패: ${e.message}`, 'err');
        } finally {
            rebuildBtn.disabled = false;
        }
    }

    function resetWorkspace() {
        STATE.jobId = null;
        STATE.originalPackage = null;
        STATE.signedUrl = null;
        jobIdLabel.textContent = '없음';
        originalPackageLabel.textContent = '-';
        newPackageInput.value = '';
        newPackageInput.placeholder = '예: com.your.new.app';
        downloadLink.href = '#';
        downloadLink.style.opacity = '0.5';
        downloadLink.style.pointerEvents = 'none';
        downloadLink.textContent = '다운로드 준비 안됨';
        forceDownloadBtn.disabled = true;
        clearLog();
        log('워크스페이스 초기화', 'info');
    }

    // 이벤트
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            const file = files[0];
            if (file.name.endsWith('.apk') || file.name.endsWith('.xapk')) {
                uploadFile(file);
            } else {
                log('APK 또는 XAPK 파일만 지원됩니다.', 'err');
            }
        }
    });
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            uploadFile(e.target.files[0]);
        }
        fileInput.value = '';
    });

    rebuildBtn.addEventListener('click', rebuildAndSign);
    resetBtn.addEventListener('click', resetWorkspace);

    forceDownloadBtn.addEventListener('click', () => {
        if (STATE.signedUrl) {
            window.open(`${API_BASE}${STATE.signedUrl}`, '_blank');
        }
    });

    log('APKWorkshop · 패키지명 변경 전용', 'info');
    log('APK 업로드 후 새 패키지명을 입력하고 리빌드하세요.', 'info');
})();
</script>
</body>
</html>
